<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财务自由仪表板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; padding: 20px; color: #1a1a1a; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #f0f0f0; } .metric { background: #2a2a2a; } .card { background: #222; border-color: rgba(255,255,255,0.1); } .progress-wrap, .freedom-bar-wrap { background: #333; } }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
.metric { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 500; }
.metric-sub { font-size: 11px; color: #888; margin-top: 3px; }
.card { background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.red { color: #E24B4A; } .green { color: #1D9E75; } .orange { color: #EF9F27; }
.freedom-bar-wrap { background: #f0f0f0; border-radius: 6px; height: 10px; overflow: hidden; margin: 8px 0; }
.freedom-bar-fill { height: 10px; border-radius: 6px; background: #1D9E75; }
.legend-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 12px; color: #888; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
.debt-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 13px; }
.debt-row:last-child { border-bottom: none; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
.badge-red { background: #FCEBEB; color: #A32D2D; }
.badge-gray { background: #F1EFE8; color: #5F5E5A; }
.section-divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 12px 0; }

/* UPDATE PANEL */
.update-panel { background: #f9f9f7; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.update-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.update-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.update-item label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
.update-item input { width: 100%; font-size: 13px; padding: 5px 8px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px; background: #fff; }
.btn-update { font-size: 13px; padding: 7px 16px; border-radius: 7px; border: 0.5px solid rgba(0,0,0,0.2); background: #1a1a1a; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
  <div>
    <h1 style="font-size:22px;font-weight:500;">💎 财务自由仪表板</h1>
    <p style="font-size:12px;color:#888;margin-top:2px;">更新数字后点击「刷新仪表板」</p>
  </div>
  <button class="btn-update" onclick="refreshDashboard()">刷新仪表板 ↻</button>
</div>

<div class="update-panel">
  <div class="update-title">更新数据</div>
  <div class="update-grid">
    <div class="update-item"><label>NEC Maybank (RM)</label><input id="u-nec" type="number" value="1266.10"></div>
    <div class="update-item"><label>PLAY+EDUC GX Bank (RM)</label><input id="u-play" type="number" value="489"></div>
    <div class="update-item"><label>GIVE GX Bank (RM)</label><input id="u-give" type="number" value="122.25"></div>
    <div class="update-item"><label>FFA TnG e-Mas (RM)</label><input id="u-emas" type="number" value="122.25"></div>
    <div class="update-item"><label>FFA Principal Islamic (RM)</label><input id="u-principal" type="number" value="122.25"></div>
    <div class="update-item"><label>LTSS MIGA-i (RM)</label><input id="u-miga" type="number" value="1531.64"></div>
    <div class="update-item"><label>SC Journey 欠款 (RM)</label><input id="u-sc" type="number" value="18379.16"></div>
    <div class="update-item"><label>HSBC 欠款 (RM)</label><input id="u-hsbc" type="number" value="26705"></div>
    <div class="update-item"><label>Maybank FCB 欠款 (RM)</label><input id="u-may" type="number" value="16705"></div>
  </div>
</div>

<div class="grid-4" id="metrics-grid"></div>

<div class="card">
  <div class="card-title">财务自由进度（被动收入 ÷ 月支出）</div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px;">
    <span id="freedom-left">被动收入 RM 0</span>
    <span>目标：月支出（先填月支出记录）</span>
  </div>
  <div class="freedom-bar-wrap"><div class="freedom-bar-fill" id="freedom-bar" style="width:0%"></div></div>
  <div style="font-size:12px;color:#888;" id="freedom-note">FFA 投资现值 RM 244.50 — 增值型资产，尚未产生现金流</div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">六罐子余额</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#1D9E75"></span>NEC</span>
      <span><span class="legend-dot" style="background:#7F77DD"></span>PLAY+EDUC</span>
      <span><span class="legend-dot" style="background:#D4537E"></span>FFA</span>
      <span><span class="legend-dot" style="background:#BA7517"></span>GIVE</span>
      <span><span class="legend-dot" style="background:#378ADD"></span>LTSS</span>
    </div>
    <div style="position:relative;height:180px;"><canvas id="jarsChart" role="img" aria-label="六罐子余额分布"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">负债结构</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#E24B4A"></span>房贷</span>
      <span><span class="legend-dot" style="background:#EF9F27"></span>信用卡</span>
      <span><span class="legend-dot" style="background:#7F77DD"></span>个人借款</span>
    </div>
    <div style="position:relative;height:180px;"><canvas id="debtChart" role="img" aria-label="负债结构分布"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="card-title">信用卡负债详情</div>
  <div id="cc-rows"></div>
  <div class="section-divider"></div>
  <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:500;">
    <span>信用卡总负债</span><span class="red" id="cc-total">RM 61,789</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CC_CARDS = [
  { name: 'HSBC Visa Signature', id: 'u-hsbc', limit: 28000 },
  { name: 'SC Journey', id: 'u-sc', limit: 19000 },
  { name: 'Maybank FC Barcelona', id: 'u-may', limit: 15000 },
  { name: 'Alliance Infinite', limit: 15000, fixed: 0 },
  { name: 'Alliance Signature', limit: 15000, fixed: 0 }
];
const PERSONAL_DEBT = 33300;
const MORTGAGE = 616380;

let jarsChart, debtChart;

function fmt(n, dec=2) { return 'RM ' + Number(n).toLocaleString('en-MY',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }

function getValues() {
  return {
    nec: parseFloat(document.getElementById('u-nec').value)||0,
    play: parseFloat(document.getElementById('u-play').value)||0,
    give: parseFloat(document.getElementById('u-give').value)||0,
    emas: parseFloat(document.getElementById('u-emas').value)||0,
    principal: parseFloat(document.getElementById('u-principal').value)||0,
    miga: parseFloat(document.getElementById('u-miga').value)||0,
    sc: parseFloat(document.getElementById('u-sc').value)||0,
    hsbc: parseFloat(document.getElementById('u-hsbc').value)||0,
    may: parseFloat(document.getElementById('u-may').value)||0,
  };
}

function refreshDashboard() {
  const v = getValues();
  const ffa = v.emas + v.principal;
  const jarsTotal = v.nec + v.play + v.give + ffa + v.miga;
  const totalAssets = jarsTotal;
  const ccTotal = v.sc + v.hsbc + v.may;
  const totalLiabs = MORTGAGE + ccTotal + PERSONAL_DEBT;
  const netWorth = totalAssets - totalLiabs;

  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric"><div class="metric-label">净资产</div><div class="metric-value ${netWorth>=0?'green':'red'}">${(netWorth<0?'-':'')}RM ${Math.abs(netWorth).toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0})}</div><div class="metric-sub">资产 − 负债</div></div>
    <div class="metric"><div class="metric-label">总资产</div><div class="metric-value">${fmt(totalAssets,0)}</div><div class="metric-sub">现金 + 投资</div></div>
    <div class="metric"><div class="metric-label">总负债</div><div class="metric-value red">${fmt(totalLiabs,0)}</div><div class="metric-sub">含个人借款</div></div>
    <div class="metric"><div class="metric-label">信用卡总欠款</div><div class="metric-value red">${fmt(ccTotal,0)}</div><div class="metric-sub">5张卡合计</div></div>`;

  document.getElementById('freedom-note').textContent = `FFA 投资现值 ${fmt(ffa)} — 增值型资产，尚未产生现金流`;

  const ccRows = document.getElementById('cc-rows');
  const cards = [
    { name: 'HSBC Visa Signature', owed: v.hsbc, limit: 28000 },
    { name: 'SC Journey', owed: v.sc, limit: 19000 },
    { name: 'Maybank FC Barcelona', owed: v.may, limit: 15000 },
    { name: 'Alliance Infinite', owed: 0, limit: 15000 },
    { name: 'Alliance Signature', owed: 0, limit: 15000 },
  ];
  ccRows.innerHTML = cards.map(c => {
    const pct = c.limit > 0 ? Math.min(110, Math.round(c.owed/c.limit*100)) : 0;
    const over = pct > 100;
    const high = pct >= 80;
    const barColor = over ? '#E24B4A' : high ? '#EF9F27' : '#1D9E75';
    const badgeClass = over ? 'badge-red' : pct === 0 ? 'badge-gray' : 'badge-red';
    const badgeText = over ? '超限' : pct+'%';
    return `<div class="debt-row">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${barColor};margin-right:6px;"></span>${c.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:80px;background:#f0f0f0;border-radius:3px;height:5px;overflow:hidden;"><div style="width:${Math.min(100,pct)}%;height:5px;background:${barColor};border-radius:3px;"></div></div>
        <span style="font-weight:500;font-size:13px;min-width:72px;text-align:right;">${fmt(c.owed,0)}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cc-total').textContent = fmt(ccTotal, 0);

  if (jarsChart) jarsChart.destroy();
  jarsChart = new Chart(document.getElementById('jarsChart'), {
    type: 'doughnut',
    data: {
      labels: ['NEC','PLAY+EDUC','FFA','GIVE','LTSS'],
      datasets: [{ data: [v.nec, v.play, ffa, v.give, v.miga], backgroundColor: ['#1D9E75','#7F77DD','#D4537E','#BA7517','#378ADD'], borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + fmt(c.parsed) } } } }
  });

  if (debtChart) debtChart.destroy();
  debtChart = new Chart(document.getElementById('debtChart'), {
    type: 'doughnut',
    data: {
      labels: ['房贷','信用卡','个人借款'],
      datasets: [{ data: [MORTGAGE, ccTotal, PERSONAL_DEBT], backgroundColor: ['#E24B4A','#EF9F27','#7F77DD'], borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + fmt(c.parsed, 0) } } } }
  });
}

refreshDashboard();
</script>
</body>
</html>
